# SentinelSDLC DevSecOps pipeline (CI-as-code).
#
# Runs on the self-hosted runner, which IS the host where the SentinelSDLC
# platform lives (/home/karim/appSecPlatform) and the in-cluster hub is
# port-forwarded. So there is NOTHING to install — the `sentinel` CLI and all
# scanners (bandit/semgrep/checkov in the platform venv; gitleaks/grype in
# ~/.local/bin; trivy on PATH) already exist on the host. We just put them on
# PATH. The local `make pipeline` / pipeline/run.sh remains the source of truth.
#
# Optional repo secrets (sensible defaults applied if unset):
#   SENTINEL_HUB_URL  default http://127.0.0.1:8001  (the port-forwarded hub)
#   SENTINEL_TOKEN    default dev-sentinel-token
name: SentinelSDLC
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write     # to comment
  security-events: write   # to upload SARIF

jobs:
  sentinel:
    runs-on: self-hosted
    env:
      SENTINEL_API_URL: ${{ secrets.SENTINEL_HUB_URL || 'http://127.0.0.1:8001' }}
      SENTINEL_TOKEN: ${{ secrets.SENTINEL_TOKEN || 'dev-sentinel-token' }}
      ASSET: myplat-api
    steps:
      - uses: actions/checkout@v4

      # No tool installs — the runner is the host. Just expose the existing
      # SentinelSDLC CLI + scanners (and gitleaks/grype) on PATH for this job.
      - name: Put host toolchain on PATH
        run: |
          echo "/home/karim/appSecPlatform/.venv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # The app pins OLD deps that would clash with the CLI's deps, so its tests
      # run in a throwaway venv — this is the only install, and it is isolated.
      - name: Build & unit test
        run: |
          python3 -m venv /tmp/myplat-ci
          /tmp/myplat-ci/bin/pip install -q -r requirements.txt pytest
          /tmp/myplat-ci/bin/python -m pytest -q tests

      - name: Register asset (idempotent)
        run: |
          sentinel join --asset-name "$ASSET" --kind service \
            --labels env=prod,scope=pci --internet-facing \
            --sensitivity cardholder --deployment prod --accept || true

      - name: Scan & import (SAST / secrets / SCA / IaC)
        run: sentinel scan --asset "$ASSET" --config sentinel.yaml

      - name: Governance policy + placement (idempotent)
        run: |
          sentinel policy apply -f policy.yaml || true
          sentinel placement create --name no-crit-epss-prod \
            --policy no-crit-epss --selector env=prod || true

      # if: always() so the SARIF is produced even if the scan step had a hiccup.
      - name: Reports (SARIF / JUnit / Markdown)
        if: always()
        run: |
          sentinel report --format sarif --asset "$ASSET" --out sentinel.sarif
          sentinel report --format junit --asset "$ASSET" --out report.xml
          sentinel report --format markdown --asset "$ASSET" > sentinel-summary.md

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sentinel.sarif

      - name: Security gate (enforce — blocks the build on breach)
        run: sentinel gate --policy no-crit-epss --asset "$ASSET"
