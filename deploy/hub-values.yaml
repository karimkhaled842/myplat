# Helm overrides for deploying the SentinelSDLC hub into kind.
# Used by `make hub` (helm upgrade --install -f deploy/hub-values.yaml).
image:
  repository: sentinel-hub
  tag: local
  pullPolicy: Never            # kind-loaded local image; never pull from a registry

# SQLite on an emptyDir (the backend ships no psycopg driver, so Postgres mode
# is skipped). Persistent for the pod's lifetime — fine for a single demo run.
postgres:
  enabled: false

config:
  # cors_origins is a list[str]; pydantic-settings JSON-parses env values for
  # complex types, so this MUST be a JSON array string (a bare URL crashes boot).
  corsOrigins: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:5174","http://127.0.0.1:5174"]'
  enrichmentOnline: "true"
  ticketSystem: "local"

secret:
  apiToken: "dev-sentinel-token"
